<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Register — Cyber Buddy Academy</title>
  <link rel="icon" href="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/main/mylogo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
  <style>
    :root { --accent:#06b6d4; --accent2:#0ea5e9; --bg:#0b1220; --bg2:#0d1829; --bdr:rgba(6,182,212,.15); --tx:#e6f6f8; --dim:#64748b; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--tx); min-height:100vh; }

    .bg-canvas { position:fixed; inset:0; z-index:0; }
    .bg-canvas canvas { width:100%; height:100%; display:block; }
    .content { position:relative; z-index:1; }

    nav { height:58px; background:rgba(11,18,32,.92); border-bottom:1px solid var(--bdr); display:flex; align-items:center; padding:0 24px; backdrop-filter:blur(12px); }
    .nav-logo { display:flex; align-items:center; gap:9px; font-weight:800; font-size:.95rem; color:var(--accent); }
    .nav-logo img { width:30px; height:30px; border-radius:7px; }

    .glass-card { background:rgba(13,24,41,.75); border:1px solid rgba(6,182,212,.13); backdrop-filter:blur(16px); border-radius:18px; }

    .input-wrap { position:relative; }
    .input-field {
      width:100%; padding:11px 14px;
      background:rgba(255,255,255,.04); border:1.5px solid rgba(6,182,212,.18);
      border-radius:10px; color:var(--tx); font-family:'Poppins',sans-serif; font-size:.87rem;
      transition:border-color .25s, box-shadow .25s; outline:none;
    }
    .input-field:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(6,182,212,.1); }
    .input-field::placeholder { color:rgba(230,246,248,.28); }
    .input-field.error-field { border-color:#f43f5e !important; box-shadow:0 0 0 3px rgba(244,63,94,.07); }
    .input-field.ok-field { border-color:#22c55e !important; }

    .field-error { font-size:.7rem; color:#f87171; margin-top:4px; display:none; }
    .field-error.show { display:block; }

    .btn-primary {
      width:100%; padding:13px; background:linear-gradient(135deg,#06b6d4,#0ea5e9);
      color:#042028; font-weight:700; font-size:.9rem; border:none; border-radius:10px;
      cursor:pointer; transition:transform .2s, box-shadow .2s; font-family:'Poppins',sans-serif;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 24px rgba(6,182,212,.35); }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; }

    .alert-banner {
      padding:11px 14px; border-radius:9px; font-size:.82rem; font-weight:600;
      display:none; align-items:center; gap:9px; line-height:1.4;
    }
    .alert-banner.show { display:flex; }
    .alert-banner.error { background:rgba(76,5,25,.6); border:1px solid rgba(244,63,94,.35); color:#fda4af; }
    .alert-banner.success { background:rgba(6,78,59,.6); border:1px solid rgba(16,185,129,.3); color:#6ee7b7; }

    .strength-bar { height:4px; border-radius:2px; transition:all .3s; }

    .form-wrap { animation:formIn .55s cubic-bezier(.22,1,.36,1) both; }
    @keyframes formIn { from{opacity:0;transform:translateY(24px) scale(.98)} to{opacity:1;transform:none} }

    .glow { color:var(--accent); text-shadow:0 0 24px rgba(6,182,212,.25); }
    label { display:block; font-size:.68rem; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:5px; }

    /* Verification overlay */
    .verify-overlay {
      position:fixed; inset:0; background:rgba(11,18,32,.92); backdrop-filter:blur(14px);
      z-index:50; display:none; align-items:center; justify-content:center; padding:20px;
    }
    .verify-overlay.show { display:flex; }
    .verify-card { background:rgba(13,24,41,.95); border:1px solid rgba(6,182,212,.22); border-radius:18px; padding:36px 32px; max-width:420px; width:100%; text-align:center; }
    .pulse-icon { animation:pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
  </style>
</head>
<body>
  <div class="bg-canvas"><canvas id="bg"></canvas></div>

  <!-- Email verification overlay -->
  <div id="verifyOverlay" class="verify-overlay">
    <div class="verify-card">
      <div class="pulse-icon" style="width:70px;height:70px;border-radius:50%;background:rgba(6,182,212,.1);border:2px solid rgba(6,182,212,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;">
        <i class="fas fa-envelope-open" style="color:var(--accent);font-size:1.6rem;"></i>
      </div>
      <h2 class="glow" style="font-size:1.25rem;font-weight:800;margin-bottom:10px;">Verify Your Email</h2>
      <p style="color:var(--dim);font-size:.85rem;margin-bottom:8px;">We sent a verification link to:</p>
      <p id="verifyEmail" style="font-weight:700;color:var(--tx);font-size:.9rem;margin-bottom:16px;"></p>
      <p style="color:var(--dim);font-size:.78rem;margin-bottom:24px;line-height:1.6;">Click the link in your inbox to activate your account. Check your spam folder if you don't see it.</p>
      <a href="login.html" class="btn-primary" style="text-decoration:none;justify-content:center;">
        <i class="fas fa-sign-in-alt"></i> Go to Login
      </a>
    </div>
  </div>

  <div class="content">
    <nav>
      <div class="nav-logo">
        <img src="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/refs/heads/main/mylogo.png" alt="">
        <span>Cyber<span style="color:#fff;">Buddy</span> <span style="font-size:.7rem;font-weight:400;color:var(--dim);">Academy</span></span>
      </div>
    </nav>

    <div class="min-h-screen flex items-center justify-center p-4 py-8" style="min-height:calc(100vh - 58px);">
      <div class="form-wrap w-full max-w-md">

        <div class="text-center mb-7">
          <div style="width:62px;height:62px;border-radius:14px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
            <img src="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/refs/heads/main/mylogo.png" alt="" style="width:36px;height:36px;border-radius:7px;">
          </div>
          <h1 class="text-2xl font-bold glow" style="letter-spacing:-.3px;">Create Account</h1>
          <p class="text-sm mt-1" style="color:var(--dim);">Join Cyber Buddy Academy — it's free</p>
        </div>

        <div class="glass-card p-8 space-y-4">

          <!-- Alert banner -->
          <div id="alertBanner" class="alert-banner">
            <i class="fas fa-exclamation-circle" style="flex-shrink:0;"></i>
            <span id="alertText"></span>
          </div>

          <!-- Full Name -->
          <div>
            <label>Full Name</label>
            <input id="name" type="text" class="input-field" placeholder="Mohamed Mubeen" autocomplete="name">
            <p class="field-error" id="nameErr"></p>
          </div>

          <!-- Phone -->
          <div>
            <label>Phone Number</label>
            <input id="phone" type="tel" class="input-field" placeholder="+91 98765 43210" autocomplete="tel">
          </div>

          <!-- Email -->
          <div>
            <label>Email Address</label>
            <input id="email" type="email" class="input-field" placeholder="you@email.com" autocomplete="email">
            <p class="field-error" id="emailErr"></p>
          </div>

          <!-- Password -->
          <div>
            <label>Password</label>
            <div class="input-wrap">
              <input id="password" type="password" class="input-field" placeholder="Min. 8 characters" style="padding-right:44px;" oninput="checkStrength()" autocomplete="new-password">
              <button id="togglePw" type="button" style="position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;padding:4px;font-size:.88rem;">
                <i class="fas fa-eye" id="pwIcon"></i>
              </button>
            </div>
            <!-- Strength bars -->
            <div style="display:flex;gap:3px;margin-top:7px;">
              <div id="s1" class="strength-bar flex-1" style="background:#1e293b;"></div>
              <div id="s2" class="strength-bar flex-1" style="background:#1e293b;"></div>
              <div id="s3" class="strength-bar flex-1" style="background:#1e293b;"></div>
              <div id="s4" class="strength-bar flex-1" style="background:#1e293b;"></div>
            </div>
            <p id="strengthText" style="font-size:.7rem;margin-top:4px;color:var(--dim);"></p>
            <p class="field-error" id="passErr"></p>
          </div>

          <!-- Confirm Password -->
          <div>
            <label>Confirm Password</label>
            <input id="confirmPw" type="password" class="input-field" placeholder="Re-enter password" autocomplete="new-password">
            <p class="field-error" id="confirmErr"></p>
          </div>

          <!-- Terms -->
          <label style="display:flex;align-items:flex-start;gap:9px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:.78rem;color:var(--dim);margin-top:2px;">
            <input id="terms" type="checkbox" style="margin-top:2px;accent-color:var(--accent);width:15px;height:15px;flex-shrink:0;">
            I agree to the <a href="#" style="color:var(--accent);">Terms of Service</a> and <a href="#" style="color:var(--accent);">Privacy Policy</a>
          </label>
          <p class="field-error" id="termsErr"></p>

          <button id="registerBtn" class="btn-primary" style="margin-top:6px;">
            <i class="fas fa-user-plus"></i> Create Account
          </button>

          <p style="text-align:center;font-size:.82rem;color:var(--dim);">
            Already have an account?
            <a href="login.html" style="color:var(--accent);font-weight:700;text-decoration:none;margin-left:4px;">Sign In</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');let drops=[];
    function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;drops=Array.from({length:Math.floor(canvas.width/15)},()=>Math.random()*50);}
    resize();window.addEventListener('resize',resize);
    function draw(){
      ctx.fillStyle='rgba(11,18,32,0.08)';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle='rgba(6,182,212,0.55)';ctx.font='12px monospace';
      drops.forEach((y,i)=>{ctx.fillText(Math.random()>.5?'1':'0',i*15,y*15);if(y*15>canvas.height&&Math.random()>.975)drops[i]=0;drops[i]+=.7;});
    }
    setInterval(draw,55);

    const pw=document.getElementById('password'),pwIcon=document.getElementById('pwIcon');
    document.getElementById('togglePw').onclick=()=>{const v=pw.type==='password';pw.type=v?'text':'password';pwIcon.className=v?'fas fa-eye-slash':'fas fa-eye';};

    function checkStrength(){
      const v=document.getElementById('password').value;
      const bars=['s1','s2','s3','s4'].map(id=>document.getElementById(id));
      const txt=document.getElementById('strengthText');
      let score=0;
      if(v.length>=8)score++;if(/[A-Z]/.test(v))score++;if(/[0-9]/.test(v))score++;if(/[^a-zA-Z0-9]/.test(v))score++;
      const colors=['','#f43f5e','#fb923c','#facc15','#22c55e'];
      const labels=['','Weak — too easy to guess','Fair — add numbers or symbols','Good — almost there','Strong ✓'];
      bars.forEach((b,i)=>{b.style.background=i<score?colors[score]:'#1e293b';});
      txt.textContent=v.length?labels[score]:'';txt.style.color=colors[score]||'';
    }
  </script>

  <script type="module">
    import { auth, db } from "./js/firebase.js";
    import { createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    function showAlert(msg, type='error') {
      const b=document.getElementById('alertBanner'),t=document.getElementById('alertText');
      t.textContent=msg; b.className=`alert-banner show ${type}`;
      b.querySelector('i').className=type==='success'?'fas fa-check-circle':'fas fa-exclamation-circle';
    }
    function clearErrors() {
      document.getElementById('alertBanner').classList.remove('show');
      ['name','email','password','confirmPw'].forEach(id=>document.getElementById(id).classList.remove('error-field','ok-field'));
      ['nameErr','emailErr','passErr','confirmErr','termsErr'].forEach(id=>{const e=document.getElementById(id);e.textContent='';e.classList.remove('show');});
    }
    function fieldError(fieldId, errId, msg) {
      document.getElementById(fieldId).classList.add('error-field');
      const e=document.getElementById(errId); e.textContent=msg; e.classList.add('show');
    }

    function parseFirebaseError(code, message) {
      const map = {
        'auth/email-already-in-use': 'An account with this email already exists. Try signing in instead.',
        'auth/invalid-email': 'Please enter a valid email address.',
        'auth/weak-password': 'Password is too weak. Use at least 8 characters with a mix of letters and numbers.',
        'auth/operation-not-allowed': 'Email registration is currently disabled. Contact support.',
        'auth/network-request-failed': 'Network error. Check your internet connection and try again.',
        'auth/too-many-requests': 'Too many requests. Please wait a moment and try again.',
      };
      return map[code] || message || 'Registration failed. Please try again.';
    }

    document.getElementById('registerBtn').onclick = async () => {
      clearErrors();
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPw = document.getElementById('confirmPw').value;
      const terms = document.getElementById('terms').checked;

      let hasError = false;

      if (!name) { fieldError('name','nameErr','Your full name is required.'); hasError=true; }
      if (!email) { fieldError('email','emailErr','Email address is required.'); hasError=true; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { fieldError('email','emailErr','Please enter a valid email address.'); hasError=true; }
      if (!password) { fieldError('password','passErr','Password is required.'); hasError=true; }
      else if (password.length < 8) { fieldError('password','passErr','Password must be at least 8 characters long.'); hasError=true; }
      if (password && confirmPw && password !== confirmPw) { fieldError('confirmPw','confirmErr','Passwords do not match. Please re-enter.'); hasError=true; }
      if (!terms) { const e=document.getElementById('termsErr'); e.textContent='You must accept the Terms of Service to continue.'; e.classList.add('show'); hasError=true; }

      if (hasError) return;

      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating your account...';

      try {
        const res = await createUserWithEmailAndPassword(auth, email, password);
        // Send verification email BEFORE creating Firestore doc (account creation pending verification)
        await sendEmailVerification(res.user);
        // Create Firestore user doc
        await setDoc(doc(db, 'users', res.user.uid), {
          name, phone, email, role: 'user',
          purchasedCourses: [], createdAt: new Date(), emailVerified: false
        });
        document.getElementById('verifyEmail').textContent = email;
        document.getElementById('verifyOverlay').classList.add('show');
      } catch (err) {
        const msg = parseFirebaseError(err.code, err.message?.replace('Firebase: ','').replace(/\(auth.*\)/,''));
        if (err.code === 'auth/email-already-in-use') {
          fieldError('email', 'emailErr', msg);
        } else if (err.code === 'auth/invalid-email') {
          fieldError('email', 'emailErr', msg);
        } else if (err.code === 'auth/weak-password') {
          fieldError('password', 'passErr', msg);
        } else {
          showAlert(msg, 'error');
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
      }
    };
  </script>
</body>
</html>
